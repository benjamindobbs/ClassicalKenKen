<!DOCTYPE html>
<html lang="en">
<head>
    <title>SAT Practice — Classical Technology</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="../index.html">Classical Technology</a>
        <div class="nav-links">
            <a href="../KenKen/">Play KenKen</a>
            <a href="./" class="active">Practice SAT</a>
            <a href="../Skill-Maps/">Skill Maps</a>
            <a href="../readme/">ReadMe</a>
            <a href="../teacher/index.html" class="nav-teacher">Teacher</a>
        </div>
    </nav>

    <div id="landing" class="landing">
        <div class="landing-card">
            <h1>SAT Practice</h1>
            <p>Sign in with your school Google account to receive questions matched to your level, or practice locally without an account.</p>
            <div class="landing-actions">
                <button class="btn btn-primary" id="authorize_button" onclick="handleAuthClick()" disabled>Sign In with Google</button>
                <button class="btn btn-outline" id="local_button" onclick="playLocally()">Play Locally</button>
            </div>
            <p class="landing-status" id="landing_status">Loading&hellip;</p>
        </div>
    </div>

    <div id="game-ui" style="display:none">
        <div class="game-header">
            <span class="game-title">SAT Practice</span>
            <div class="auth-controls">
                <span id="daily-pill" class="daily-pill" style="display:none"><span class="dp-count"></span></span>
                <button class="btn btn-outline" id="signout_button" onclick="handleSignoutClick()" style="display:none">Sign Out</button>
            </div>
        </div>

        <div class="quiz-area">
            <div class="begin-bar">
                <button class="btn btn-primary" id="create_button" onclick="nextQuestion()">Begin</button>
            </div>

            <h2 id="Question"></h2>

            <div id="questionDiv" style="display:none">
                <div class="answer-option">
                    <input type="radio" name="answer" id="A">
                    <span class="answer-label-letter">A</span>
                    <label id="A Button"></label>
                </div>
                <div class="answer-option">
                    <input type="radio" name="answer" id="B">
                    <span class="answer-label-letter">B</span>
                    <label id="B Button"></label>
                </div>
                <div class="answer-option">
                    <input type="radio" name="answer" id="C">
                    <span class="answer-label-letter">C</span>
                    <label id="C Button"></label>
                </div>
                <div class="answer-option">
                    <input type="radio" name="answer" id="D">
                    <span class="answer-label-letter">D</span>
                    <label id="D Button"></label>
                </div>

                <div id="Rationale"></div>
            </div>

            <div id="submissionButtons" class="action-bar" style="visibility:hidden">
                <button class="btn btn-primary" id="submit" onclick="submit()">Submit</button>
                <button class="btn btn-outline" id="nextquestion" onclick="nextQuestion()">Next Question</button>
                <button class="btn-ghost-small" id="report" onclick="reportQuestion()">Report Question</button>
                <button class="btn btn-outline" id="complete_session" onclick="completeSession()" style="margin-left:auto">Complete Session</button>
            </div>

            <p id="submitMessage"></p>
        </div>

        <div id="session-view" style="display:none"></div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/dailyprogress.js"></script>
    <script src="../js/SATsubmit.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="../js/SATmain.js"></script>
</body>
</html>
