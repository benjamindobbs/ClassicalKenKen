<!DOCTYPE html>
<html lang="en">
<head>
    <title>SAT Practice — Classical Technology</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .page-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.875rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .page-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #0f172a;
        }

        .auth-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .quiz-area {
            max-width: 720px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        .begin-bar {
            text-align: center;
            margin-bottom: 2rem;
        }

        #Question {
            font-size: 1.0625rem;
            font-weight: 500;
            line-height: 1.65;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.75rem 2rem;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        #questionDiv {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem 2rem;
            margin-bottom: 1.25rem;
        }

        .answer-option {
            display: flex;
            align-items: flex-start;
            gap: 0.875rem;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.625rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .answer-option:hover {
            border-color: #93c5fd;
            background: #f0f7ff;
        }

        .answer-option input[type="radio"] {
            margin-top: 0.1rem;
            accent-color: var(--accent);
            flex-shrink: 0;
            width: 1rem;
            height: 1rem;
        }

        .answer-label-letter {
            font-weight: 700;
            color: var(--muted);
            font-size: 0.875rem;
            flex-shrink: 0;
            width: 1rem;
        }

        label[id$=" Button"] {
            font-size: 0.9375rem;
            line-height: 1.5;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            display: block;
        }

        #Rationale {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #14532d;
            margin-top: 1rem;
        }

        .action-bar {
            display: flex;
            gap: 0.625rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1.25rem;
        }

        .action-bar .btn-ghost-small {
            font-size: 0.8125rem;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            transition: color 0.15s, background 0.15s;
        }

        .action-bar .btn-ghost-small:hover {
            color: var(--text);
            background: #f1f5f9;
        }

        #submitMessage {
            text-align: center;
            font-size: 0.875rem;
            color: var(--muted);
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="../index.html">Classical Technology</a>
        <div class="nav-links">
            <a href="../KenKen/kenken.html">Play KenKen</a>
            <a href="./english.html" class="active">Practice SAT</a>
            <a href="../Skill-Maps/index.html">Skill Maps</a>
            <a href="../readme.html">ReadMe</a>
        </div>
    </nav>

    <div class="page-header">
        <span class="page-title">SAT Practice</span>
        <div class="auth-controls">
            <button class="btn btn-outline" id="signout_button" onclick="handleSignoutClick()">Sign Out</button>
            <button class="btn btn-primary" id="authorize_button" onclick="handleAuthClick()">Sign In</button>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <div class="quiz-area">

        <div class="begin-bar">
            <button class="btn btn-primary" id="create_button" onclick="nextQuestion()">Begin</button>
        </div>

        <h2 id="Question"></h2>

        <div id="questionDiv">
            <div class="answer-option">
                <input type="radio" name="answer" id="A">
                <span class="answer-label-letter">A</span>
                <label id="A Button"></label>
            </div>
            <div class="answer-option">
                <input type="radio" name="answer" id="B">
                <span class="answer-label-letter">B</span>
                <label id="B Button"></label>
            </div>
            <div class="answer-option">
                <input type="radio" name="answer" id="C">
                <span class="answer-label-letter">C</span>
                <label id="C Button"></label>
            </div>
            <div class="answer-option">
                <input type="radio" name="answer" id="D">
                <span class="answer-label-letter">D</span>
                <label id="D Button"></label>
            </div>

            <h3 id="Rationale"></h3>
        </div>

        <div id="submissionButtons" class="action-bar">
            <button class="btn btn-primary" id="submit" onclick="submit()">Submit</button>
            <button class="btn btn-outline" id="nextquestion" onclick="nextQuestion()">Next Question</button>
            <button class="btn-ghost-small" id="report" onclick="reportQuestion()">Report Question</button>
        </div>

        <p id="submitMessage"></p>

    </div>

    <script src="SATsubmit.js"></script>
    <script src="SATmain.js"></script>
</body>
</html>
