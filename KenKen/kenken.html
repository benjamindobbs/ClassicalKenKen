<!DOCTYPE html>
<html lang="en">
<head>
    <title>Classical KenKen</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .game-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.875rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .game-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #0f172a;
        }

        .auth-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .game-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .timer-display {
            font-size: 0.9375rem;
            font-weight: 600;
            color: #0f172a;
            font-variant-numeric: tabular-nums;
        }

        .timer-label {
            font-size: 0.8125rem;
            color: var(--muted);
        }

        #container {
            padding: 2rem;
            min-height: 400px;
        }

        .game-footer {
            padding: 0.875rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        #playerData {
            font-size: 0.875rem;
            font-weight: 600;
            color: #0f172a;
            margin: 0;
        }

        #submitMessage {
            font-size: 0.8125rem;
            color: var(--muted);
            margin: 0;
        }
    </style>
    <script src="submitscore.js"></script>
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="../index.html">Classical Technology</a>
        <div class="nav-links">
            <a href="./kenken.html" class="active">Play KenKen</a>
            <a href="../SAT-Questions/english.html">Practice SAT</a>
            <a href="../Skill-Maps/index.html">Skill Maps</a>
            <a href="../readme.html">ReadMe</a>
        </div>
    </nav>

    <div class="game-header">
        <span class="game-title">Classical KenKen</span>
        <div class="auth-controls">
            <button class="btn btn-outline" id="signout_button" onclick="handleSignoutClick()">Sign Out</button>
            <button class="btn btn-primary" id="authorize_button" onclick="handleAuthClick()">Start Game</button>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <div class="game-controls">
        <button class="btn btn-primary" id="create_button" onclick="startGame()">New Game</button>
        <button class="btn btn-outline" id="clear_button" onclick="hide()">Reset</button>
        <span class="timer-label">Time:</span>
        <span class="timer-display"><span id="time"></span>s</span>
    </div>

    <div id="container"></div>

    <div class="game-footer">
        <h3 id="playerData"></h3>
        <h5 id="submitMessage"></h5>
    </div>

    <script src="kenken.js"></script>
</body>
</html>
