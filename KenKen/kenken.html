<!DOCTYPE html>
<html lang="en">
<head>
    <title>Classical KenKen</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="../index.html">Classical Technology</a>
        <div class="nav-links">
            <a href="./kenken.html" class="active">Play KenKen</a>
            <a href="../SAT-Questions/english.html">Practice SAT</a>
            <a href="../Skill-Maps/index.html">Skill Maps</a>
            <a href="../readme.html">ReadMe</a>
            <a href="../teacher/index.html" class="nav-teacher">Teacher</a>
        </div>
    </nav>

    <div id="landing" class="landing">
        <div class="landing-card">
            <h1>Classical KenKen</h1>
            <p>Sign in with your school Google account to save scores and receive puzzles matched to your level, or play locally without an account.</p>
            <div class="landing-actions">
                <button class="btn btn-primary" id="authorize_button" onclick="handleAuthClick()" disabled>Sign In with Google</button>
                <button class="btn btn-outline" id="local_button" onclick="playLocally()">Play Locally</button>
            </div>
            <p class="landing-status" id="landing_status">Loading&hellip;</p>
        </div>
    </div>

    <div id="game-ui" style="display:none">
        <div class="game-header">
            <span class="game-title">Classical KenKen</span>
            <div class="auth-controls">
                <span id="playerData" style="font-size:0.875rem;font-weight:600;color:#0f172a;"></span>
                <button class="btn btn-outline" id="signout_button" onclick="handleSignoutClick()" style="display:none">Sign Out</button>
            </div>
        </div>

        <div class="game-controls">
            <button class="btn btn-primary" id="create_button" onclick="startGame()">New Game</button>
            <button class="btn btn-outline" id="clear_button" onclick="hide()">Reset</button>
            <span class="timer-label">Time:</span>
            <span class="timer-display"><span id="time"></span>s</span>
        </div>

        <div id="container"></div>

        <div class="game-footer">
            <p id="submitMessage"></p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/submitscore.js"></script>
    <script src="../js/kenken.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
